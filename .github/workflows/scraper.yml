# ============================================
# AstaHunter Milano - GitHub Actions Workflow
# Esegue lo scraper ogni 30 minuti
# ============================================

name: "🏠 AstaHunter Milano Scraper"

on:
  schedule:
    # Esegue ogni 30 minuti (a :00 e :30 di ogni ora)
    - cron: "*/30 * * * *"
  
  # Permette esecuzione manuale dal tab Actions
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Esegui scraper
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scraper.py
      
      - name: Upload log (in caso di errore)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-error-log
          path: alert_log.txt
